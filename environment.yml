name: b2-vscode
channels:
  - conda-forge
dependencies:
  # Runtime required by package.json: engines.node >=22.0.0.
  - nodejs>=22,<23

  # Repository and automation tooling used by local maintenance workflows.
  - git
  - gh
  - jq
  - ripgrep

  # Keep a lightweight Python available for helper scripts and tooling glue.
  - python>=3.12,<3.13

  # JavaScript dependencies are intentionally installed from package-lock.json:
  #   npm ci
