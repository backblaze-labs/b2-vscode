name: Code Quality

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "eslint.config.mjs"
      - "scripts/assert-dependency-vsix-diff.js"
      - "scripts/assert-release-workflow.js"
      - ".github/workflows/build-extension.yml"
      - ".github/workflows/code-quality.yml"
      - ".github/workflows/release.yml"
      - ".github/marketplace-publisher/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "eslint.config.mjs"
      - "scripts/assert-dependency-vsix-diff.js"
      - "scripts/assert-release-workflow.js"
      - ".github/workflows/build-extension.yml"
      - ".github/workflows/code-quality.yml"
      - ".github/workflows/release.yml"
      - ".github/marketplace-publisher/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Format, Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.13.0"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci --ignore-scripts --registry=https://registry.npmjs.org/ --userconfig=/dev/null --globalconfig=/tmp/b2-vscode-empty-npm-globalconfig

      - name: Run quality checks
        run: npm run check
