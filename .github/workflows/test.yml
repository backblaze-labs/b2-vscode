name: Tests

on:
  schedule:
    - cron: "37 8 * * 1"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "resources/icons/**"
      - "scripts/**"
      - "scripts/audit-policy.js"
      - "scripts/run-npm-audit.js"
      - "scripts/npm-command.js"
      - "audit-policy.jsonc"
      - "package.json"
      - "package-lock.json"
      - "README.md"
      - "SECURITY.md"
      - "tsconfig*.json"
      - "webpack.config.js"
      - ".vscode-test.mjs"
      - "test-harness.config.mjs"
      - ".github/dependabot.yml"
      - ".github/workflows/release.yml"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "resources/icons/**"
      - "scripts/**"
      - "scripts/audit-policy.js"
      - "scripts/run-npm-audit.js"
      - "scripts/npm-command.js"
      - "audit-policy.jsonc"
      - "package.json"
      - "package-lock.json"
      - "README.md"
      - "SECURITY.md"
      - "tsconfig*.json"
      - "webpack.config.js"
      - ".vscode-test.mjs"
      - "test-harness.config.mjs"
      - ".github/dependabot.yml"
      - ".github/workflows/release.yml"
      - ".github/workflows/test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: VS Code Extension Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm

      # Step names/order in this job are asserted by
      # scripts/assert-audit-workflow.js; update that guard if they change.
      - name: Assert audit workflow guardrails
        run: node scripts/assert-audit-workflow.js

      - name: Assert lifecycle scripts stay disabled
        run: node scripts/assert-ignore-scripts-install.js

      - name: Install dependencies without lifecycle scripts
        timeout-minutes: 10
        # Keep this lifecycle-disabled. If a future dependency needs a build
        # step, add a targeted npm rebuild after the audit and document why.
        run: bash scripts/retry.sh npm ci --ignore-scripts

      - name: Assert audit policy guardrails
        run: node scripts/assert-audit-policy.js

      - name: Assert audit gate fails closed
        timeout-minutes: 10
        env:
          npm_config_ignore_scripts: "true"
        run: bash scripts/retry.sh node scripts/assert-audit-gate-fixture.js

      - name: Audit dependency advisories
        timeout-minutes: 10
        env:
          npm_config_ignore_scripts: "true"
        # Inline this instead of the package script because package.json is
        # PR-mutable; assert-audit-policy.js keeps the local script in sync.
        run: bash scripts/retry.sh node scripts/run-npm-audit.js

      - name: Verify dependency signatures
        timeout-minutes: 10
        run: bash scripts/retry.sh npm audit signatures

      - name: Run VS Code tests with discovery guard
        timeout-minutes: 20
        run: xvfb-run -a npm test
