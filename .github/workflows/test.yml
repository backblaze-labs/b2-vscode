name: Tests

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "resources/icons/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "webpack.config.js"
      - ".vscode-test.mjs"
      - "test-harness.config.mjs"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "resources/icons/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "webpack.config.js"
      - ".vscode-test.mjs"
      - "test-harness.config.mjs"
      - ".github/workflows/test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: VS Code Extension Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run VS Code tests with discovery guard
        run: xvfb-run -a npm test
