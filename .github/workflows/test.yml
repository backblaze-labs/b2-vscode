name: Tests

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "resources/icons/**"
      - "scripts/**"
      - "audit-ci.jsonc"
      - "package.json"
      - "package-lock.json"
      - "SECURITY.md"
      - "tsconfig*.json"
      - "webpack.config.js"
      - ".vscode-test.mjs"
      - "test-harness.config.mjs"
      - ".github/dependabot.yml"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "resources/icons/**"
      - "scripts/**"
      - "audit-ci.jsonc"
      - "package.json"
      - "package-lock.json"
      - "SECURITY.md"
      - "tsconfig*.json"
      - "webpack.config.js"
      - ".vscode-test.mjs"
      - "test-harness.config.mjs"
      - ".github/dependabot.yml"
      - ".github/workflows/test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: VS Code Extension Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Assert audit workflow guardrails
        run: node scripts/assert-audit-workflow.js

      - name: Assert audit gate fails closed
        timeout-minutes: 10
        env:
          npm_config_ignore_scripts: "true"
        run: node scripts/assert-audit-gate-fixture.js

      - name: Audit dependency advisories
        timeout-minutes: 10
        env:
          npm_config_ignore_scripts: "true"
        run: |
          for attempt in 1 2 3; do
            if npx --yes audit-ci@7.1.0 --config audit-ci.jsonc; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            sleep $((attempt * 10))
          done

      - name: Install dependencies without lifecycle scripts
        timeout-minutes: 10
        run: |
          for attempt in 1 2 3; do
            if npm ci --ignore-scripts; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            sleep $((attempt * 10))
          done

      - name: Verify dependency signatures
        timeout-minutes: 10
        run: |
          for attempt in 1 2 3; do
            if npm audit signatures; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            sleep $((attempt * 10))
          done

      - name: Run VS Code tests with discovery guard
        timeout-minutes: 20
        run: xvfb-run -a npm test
