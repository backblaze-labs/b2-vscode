name: PR Tests

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  vscode-tests:
    name: VS Code Extension Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          path: source
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install dependencies without lifecycle scripts
        timeout-minutes: 10
        working-directory: source
        run: npm ci --ignore-scripts --registry=https://registry.npmjs.org/ --userconfig=/dev/null --globalconfig=/tmp/b2-vscode-empty-npm-globalconfig

      - name: Compile extension
        timeout-minutes: 10
        working-directory: source
        run: npm run compile

      - name: Lint extension
        timeout-minutes: 10
        working-directory: source
        run: npm run lint

      - name: Run VS Code tests with discovery guard
        timeout-minutes: 20
        working-directory: source
        run: xvfb-run -a npm test
