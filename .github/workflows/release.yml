name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read # default read-only access; release job escalates below

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build VSIX
    runs-on: ubuntu-latest
    permissions:
      contents: read # needed to check out and package the extension

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run compile

      - name: Package VSIX
        run: npm run vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vsix
          path: "*.vsix"
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # creates or updates the GitHub Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Download VSIX artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: ./vsix-artifacts

      - name: Extract version
        id: version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify version match
        env:
          TAG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: package.json ($PACKAGE_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Generate changelog
        run: |
          PREVIOUS_TAG=$(git describe --abbrev=0 --tags "$(git rev-list --tags --skip=1 --max-count=1)" 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          CURRENT_TAG="${GITHUB_REF_NAME}"
          git log "$PREVIOUS_TAG".."$CURRENT_TAG" --pretty=format:"* %s (%h)" --no-merges > CHANGELOG.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: Release ${{ steps.version.outputs.version }}
          body_path: CHANGELOG.txt
          files: ./vsix-artifacts/**/*.vsix
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true

  publish:
    name: Publish to Marketplace
    needs: build
    runs-on: ubuntu-latest
    permissions: {}
    if: ${{ !contains(github.ref_name, '-') }}

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Check marketplace credentials
        id: check-creds
        run: |
          if [ -n "${VSCE_KEY}" ]; then
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
            echo "VSCE_KEY not set - skipping marketplace publish"
          fi
        env:
          VSCE_KEY: ${{ secrets.VSCE_KEY }}

      - name: Download VSIX artifact
        if: steps.check-creds.outputs.has_secret == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: ./vsix-artifacts

      - name: Publish to VS Code Marketplace
        if: steps.check-creds.outputs.has_secret == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_KEY }}
        run: |
          VSIX_FILE=$(find ./vsix-artifacts -name "*.vsix" -type f | head -1)
          echo "Publishing: $VSIX_FILE"
          npx @vscode/vsce publish --packagePath "$VSIX_FILE"
