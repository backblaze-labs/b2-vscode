name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish a stable tag to the VS Code Marketplace after all gates pass. Leave false for dry-run/preflight."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"

jobs:
  verify-release-source:
    name: Verify Release Source
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag is reachable from main
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release tag ${GITHUB_REF_NAME} must point to a commit reachable from origin/main."
            exit 1
          fi

  quality:
    name: Format, Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: npm run check

  test:
    name: Behavioral Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run VS Code tests
        run: xvfb-run -a npm test

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm run audit:release

  sast:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write # Upload CodeQL results.

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build extension for analysis
        run: npm run compile

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          category: "/language:javascript-typescript"

  build:
    name: Build VSIX
    needs: [verify-release-source, quality, test, audit, sast]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Package VSIX
        run: npm run vsix

      - name: Run strict VSIX provenance gate
        run: npm run assert:vsix-assets:strict

      - name: Record VSIX checksum
        run: |
          VSIX_FILE=$(node scripts/resolve-vsix-artifact.js .)
          CHECKSUM=$(sha256sum "$VSIX_FILE" | cut -d ' ' -f1)
          printf '%s  %s\n' "$CHECKSUM" "$(basename "$VSIX_FILE")" > VSIX_SHA256SUMS.txt

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vsix
          path: |
            *.vsix
            VSIX_SHA256SUMS.txt
          retention-days: 90

  package-install-smoke:
    name: Installed VSIX Smoke
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Download VSIX artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: vsix
          path: ./vsix-artifacts

      - name: Verify installed VSIX
        run: |
          VSIX_FILE=$(node scripts/resolve-vsix-artifact.js ./vsix-artifacts --verify-checksum)
          npm run assert:vsix-assets:strict -- "$VSIX_FILE"
          xvfb-run -a npm run smoke:vsix-install -- "$VSIX_FILE"

  publish-preflight:
    name: Marketplace Preflight
    needs: [build, package-install-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name == 'workflow_dispatch' || (startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')) }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Download VSIX artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: vsix
          path: ./vsix-artifacts

      - name: Generate Marketplace manifest
        run: |
          VSIX_FILE=$(node scripts/resolve-vsix-artifact.js ./vsix-artifacts --verify-checksum)
          npm exec --no-install -- vsce generate-manifest --packagePath "$VSIX_FILE" --out marketplace.manifest
          test -s marketplace.manifest

  attest:
    name: Attest VSIX Provenance
    needs: [build, package-install-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write # Mint build provenance attestations.
      attestations: write # Store build provenance attestations.

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Download VSIX artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: vsix
          path: ./vsix-artifacts

      - name: Resolve and verify VSIX artifact
        id: vsix
        run: echo "path=$(node scripts/resolve-vsix-artifact.js ./vsix-artifacts --verify-checksum)" >> "$GITHUB_OUTPUT"

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: ${{ steps.vsix.outputs.path }}

  publish:
    name: Publish to Marketplace
    needs: [publish-preflight, attest]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      ${{
        startsWith(github.ref, 'refs/tags/v') &&
        !contains(github.ref_name, '-') &&
        (github.event_name == 'push' || inputs.publish == true)
      }}
    permissions:
      actions: read # Read marketplace environment protection rules.
      attestations: read # Verify VSIX build provenance before publishing.
      contents: read
    environment: marketplace

    steps:
      - name: Verify marketplace environment protection
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ENV_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/environments/marketplace")
          printf '%s' "$ENV_JSON" | node -e '
            const fs = require("fs");
            const env = JSON.parse(fs.readFileSync(0, "utf8"));
            const rules = Array.isArray(env.protection_rules) ? env.protection_rules : [];
            if (!rules.some((rule) => rule.type === "required_reviewers")) {
              console.error("The marketplace environment must have required reviewers before publishing.");
              process.exit(1);
            }
          '

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install isolated Marketplace publisher
        id: publisher
        run: |
          PUBLISHER_DIR="$RUNNER_TEMP/vsce-publisher"
          rm -rf "$PUBLISHER_DIR"
          mkdir -p "$PUBLISHER_DIR"
          cp .github/marketplace-publisher/package.json "$PUBLISHER_DIR/package.json"
          cp .github/marketplace-publisher/package-lock.json "$PUBLISHER_DIR/package-lock.json"
          cd "$PUBLISHER_DIR"
          npm ci --ignore-scripts --no-audit --no-fund --omit=dev
          VSCE_BIN="$PUBLISHER_DIR/node_modules/.bin/vsce"
          test -x "$VSCE_BIN"
          echo "bin=$VSCE_BIN" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Download VSIX artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: vsix
          path: ./vsix-artifacts

      - name: Resolve and verify VSIX artifact
        id: vsix
        run: echo "path=$(node scripts/resolve-vsix-artifact.js ./vsix-artifacts --verify-checksum)" >> "$GITHUB_OUTPUT"

      - name: Verify VSIX build provenance attestation
        env:
          GH_TOKEN: ${{ github.token }}
          VSIX_FILE: ${{ steps.vsix.outputs.path }}
        run: |
          for attempt in 1 2 3; do
            if gh attestation verify "$VSIX_FILE" --repo "$GITHUB_REPOSITORY"; then
              exit 0
            fi
            status=$?
            if [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi
            sleep $((attempt * 10))
          done

      - name: Verify Marketplace publisher token
        env:
          VSCE_BIN: ${{ steps.publisher.outputs.bin }}
          VSCE_PAT: ${{ secrets.VSCE_KEY }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_KEY is not available in the marketplace environment."
            exit 1
          fi
          cd "$RUNNER_TEMP"
          env -u NODE_OPTIONS -u NODE_PATH "$VSCE_BIN" verify-pat backblaze

      - name: Publish to VS Code Marketplace
        env:
          VSCE_BIN: ${{ steps.publisher.outputs.bin }}
          VSCE_PAT: ${{ secrets.VSCE_KEY }}
          VSIX_FILE: ${{ steps.vsix.outputs.path }}
        # VS Code Marketplace does not support OIDC trusted publishing, so vsce requires VSCE_PAT.
        run: | # zizmor: ignore[use-trusted-publishing] Marketplace publishing requires VSCE_PAT.
          cd "$RUNNER_TEMP"
          for attempt in 1 2 3; do
            echo "Publishing: $VSIX_FILE (attempt ${attempt})"
            if env -u NODE_OPTIONS -u NODE_PATH "$VSCE_BIN" publish --skip-duplicate --packagePath "$VSIX_FILE"; then
              exit 0
            fi
            status=$?
            if [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi
            sleep $((attempt * 30))
          done

  release:
    name: Create GitHub Release
    needs: [build, package-install-smoke, attest, publish]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      ${{
        always() &&
        startsWith(github.ref, 'refs/tags/v') &&
        needs.build.result == 'success' &&
        needs.package-install-smoke.result == 'success' &&
        needs.attest.result == 'success' &&
        (contains(github.ref_name, '-') || needs.publish.result == 'success')
      }}
    permissions:
      contents: write # Create GitHub Releases.

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Download VSIX artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: vsix
          path: ./vsix-artifacts

      - name: Resolve and verify VSIX artifact
        run: node scripts/resolve-vsix-artifact.js ./vsix-artifacts --verify-checksum

      - name: Extract version
        id: version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify version match
        env:
          TAG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: package.json ($PACKAGE_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Generate changelog
        run: |
          PREVIOUS_TAG=$(git describe --abbrev=0 --tags "$(git rev-list --tags --skip=1 --max-count=1)" 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          CURRENT_TAG="${GITHUB_REF_NAME}"
          git log "$PREVIOUS_TAG".."$CURRENT_TAG" --pretty=format:"* %s (%h)" --no-merges > CHANGELOG.txt
          {
            echo ""
            echo "## Artifact checksums"
            cat ./vsix-artifacts/VSIX_SHA256SUMS.txt
          } >> CHANGELOG.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: Release ${{ steps.version.outputs.version }}
          body_path: CHANGELOG.txt
          files: ./vsix-artifacts/**
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
