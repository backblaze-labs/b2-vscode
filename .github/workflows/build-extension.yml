name: Build Extension

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "resources/icons/**"
      - "src/sql-js-runtime-assets.json"
      - "scripts/build-icons.js"
      - "scripts/assert-dependency-vsix-diff.js"
      - "scripts/assert-vsix-assets.js"
      - "scripts/assert-vsix-manifest.js"
      - "scripts/release-contract.js"
      - "scripts/resolve-vsix-artifact.js"
      - "scripts/smoke-install-vsix.js"
      - "package.json"
      - "package-lock.json"
      - "npm-shrinkwrap.json"
      - ".npmrc"
      - ".github/vsix-generated-diff-allowlist.json"
      - "webpack.config.js"
      - ".github/workflows/build-extension.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "resources/icons/**"
      - "src/sql-js-runtime-assets.json"
      - "scripts/build-icons.js"
      - "scripts/assert-dependency-vsix-diff.js"
      - "scripts/assert-vsix-assets.js"
      - "scripts/assert-vsix-manifest.js"
      - "scripts/release-contract.js"
      - "scripts/resolve-vsix-artifact.js"
      - "scripts/smoke-install-vsix.js"
      - "package.json"
      - "package-lock.json"
      - "npm-shrinkwrap.json"
      - ".npmrc"
      - ".github/vsix-generated-diff-allowlist.json"
      - "webpack.config.js"
      - ".github/workflows/build-extension.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build & Package VSIX
    runs-on: ubuntu-latest
    permissions:
      contents: read # needed to check out and build the extension

    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          path: source
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.13.0"
          package-manager-cache: false

      - name: Record changed files
        if: github.event_name == 'pull_request'
        working-directory: source
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git fetch --no-tags --depth=1 origin "$BASE_SHA"
          git diff --name-only "$BASE_SHA" HEAD > "$RUNNER_TEMP/changed-files.txt"
          cat "$RUNNER_TEMP/changed-files.txt"

      - name: Evaluate dependency VSIX diff gate
        id: dependency-vsix-diff
        if: github.event_name == 'pull_request'
        working-directory: source
        env:
          CHANGED_FILES_PATH: ${{ runner.temp }}/changed-files.txt
        run: |
          node <<'NODE'
          const fs = require("fs");
          const { shouldCheckDependencyVsixDiff } = require("./scripts/assert-dependency-vsix-diff.js");

          const changedFiles = fs
            .readFileSync(process.env.CHANGED_FILES_PATH, "utf8")
            .split(/\r?\n/u)
            .filter(Boolean);
          const decision = shouldCheckDependencyVsixDiff(changedFiles);
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `should_check=${decision.check ? "true" : "false"}\nreason=${decision.reason.replace(/\r?\n/gu, " ")}\n`,
          );
          console.log(
            `Dependency VSIX generated-code diff gate ${decision.check ? "required" : "skipped"}: ${decision.reason}`,
          );
          NODE

      - name: Checkout base source for artifact diff
        if: github.event_name == 'pull_request' && steps.dependency-vsix-diff.outputs.should_check == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base-source
          persist-credentials: false

      - name: Install dependencies
        working-directory: source
        run: bash scripts/retry.sh npm ci --ignore-scripts --registry=https://registry.npmjs.org/ --userconfig=/dev/null --globalconfig=/tmp/b2-vscode-empty-npm-globalconfig

      - name: Assert audit policy guardrails
        working-directory: source
        run: node scripts/assert-audit-policy.js --repo-root "$PWD"

      - name: Audit dependency advisories
        timeout-minutes: 10
        env:
          RETRY_EXIT_CODES: "2"
          npm_config_ignore_scripts: "true"
        working-directory: source
        run: bash scripts/retry.sh node scripts/run-npm-audit.js --directory "$PWD" --policy "$PWD/audit-policy.jsonc"

      - name: Verify dependency signatures
        timeout-minutes: 10
        env:
          npm_config_ignore_scripts: "true"
        working-directory: source
        run: bash scripts/retry.sh npm audit signatures --registry=https://registry.npmjs.org/ --userconfig=/dev/null --globalconfig=/tmp/b2-vscode-empty-npm-globalconfig

      - name: Build extension
        working-directory: source
        run: npm run compile

      - name: Package VSIX
        working-directory: source
        run: npm run vsix

      - name: Package base VSIX for dependency diff
        if: github.event_name == 'pull_request' && steps.dependency-vsix-diff.outputs.should_check == 'true'
        working-directory: base-source
        run: |
          bash scripts/retry.sh npm ci --ignore-scripts --registry=https://registry.npmjs.org/ --userconfig=/dev/null --globalconfig=/tmp/b2-vscode-empty-npm-globalconfig
          npm run vsix

      - name: Check dependency-only VSIX generated-code diff
        if: github.event_name == 'pull_request' && steps.dependency-vsix-diff.outputs.should_check == 'true'
        run: |
          BASE_VSIX=$(node source/scripts/resolve-vsix-artifact.js base-source)
          HEAD_VSIX=$(node source/scripts/resolve-vsix-artifact.js source)
          node source/scripts/assert-dependency-vsix-diff.js --base "$BASE_VSIX" --head "$HEAD_VSIX" --changed-files "$RUNNER_TEMP/changed-files.txt"

      - name: Record VSIX checksum
        working-directory: source
        run: |
          VSIX_FILE=$(node scripts/resolve-vsix-artifact.js .)
          CHECKSUM=$(sha256sum "$VSIX_FILE" | cut -d ' ' -f1)
          printf '%s  %s\n' "$CHECKSUM" "$(basename "$VSIX_FILE")" > VSIX_SHA256SUMS.txt

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vsix
          path: |
            source/*.vsix
            source/VSIX_SHA256SUMS.txt
          retention-days: 30

  test-installation:
    name: Verify Packaged VSIX
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          path: source
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.13.0"
          package-manager-cache: false

      - name: Install dependencies
        working-directory: source
        run: bash scripts/retry.sh npm ci --ignore-scripts --registry=https://registry.npmjs.org/ --userconfig=/dev/null --globalconfig=/tmp/b2-vscode-empty-npm-globalconfig

      - name: Download VSIX artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vsix
          path: ./artifacts

      - name: Verify extension package
        working-directory: source
        run: |
          VSIX_FILE=$(node scripts/resolve-vsix-artifact.js ../artifacts --verify-checksum)
          echo "Found: $VSIX_FILE ($(stat -c%s "$VSIX_FILE") bytes)"
          npm run assert:vsix-assets -- "$VSIX_FILE"
          timeout 10m xvfb-run -a npm run smoke:vsix-install -- "$VSIX_FILE"

  post-pr-comment:
    name: PR Comment
    needs: build
    if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # posts the VSIX artifact link on same-repo PRs
      actions: read # reads workflow artifacts to build the PR comment URL

    steps:
      - name: Get artifact URL
        id: get-artifact
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const vsix = artifacts.data.artifacts.find(a => a.name === 'vsix');
            const url = vsix
              ? `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${vsix.id}`
              : '';
            core.setOutput('vsix_url', url);

      - name: Post PR comment
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: extension-artifact
          message: |
            ## Extension Build Ready

            Download the VSIX from the workflow artifacts above.

            <details>
            <summary>Installation</summary>

            **VS Code UI:** Extensions > ... > Install from VSIX...

            **CLI:**
            ```
            code --install-extension b2-vscode-*.vsix
            ```
            </details>
