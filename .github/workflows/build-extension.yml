name: Build Extension

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "resources/icons/**"
      - "src/sql-js-runtime-assets.json"
      - "scripts/build-icons.js"
      - "scripts/assert-vsix-assets.js"
      - "scripts/smoke-install-vsix.js"
      - "package.json"
      - "package-lock.json"
      - "webpack.config.js"
      - ".github/workflows/build-extension.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "resources/icons/**"
      - "src/sql-js-runtime-assets.json"
      - "scripts/build-icons.js"
      - "scripts/assert-vsix-assets.js"
      - "scripts/smoke-install-vsix.js"
      - "package.json"
      - "package-lock.json"
      - "webpack.config.js"
      - ".github/workflows/build-extension.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build & Package VSIX
    runs-on: ubuntu-latest
    permissions:
      contents: read # needed to check out and build the extension

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run compile

      - name: Package VSIX
        run: npm run vsix

      - name: Get VSIX filename
        id: vsix-info
        run: |
          VERSION=$(node -p "require('./package.json').version")
          VSIX_FILE="b2-vscode-${VERSION}.vsix"
          if [ -f "$VSIX_FILE" ]; then
            echo "Found VSIX: $VSIX_FILE"
          else
            echo "Error: VSIX file not found"
            ls -la -- ./*.vsix 2>/dev/null || echo "No .vsix files"
            exit 1
          fi

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vsix
          path: "*.vsix"
          retention-days: 30

  test-installation:
    name: Verify Packaged VSIX
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download VSIX artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: vsix
          path: ./artifacts

      - name: Verify extension package
        run: |
          VSIX_FILE=$(find ./artifacts -name "*.vsix" -type f | head -1)
          if [ -z "$VSIX_FILE" ]; then
            echo "Error: No .vsix file found"
            exit 1
          fi
          echo "Found: $VSIX_FILE ($(stat -c%s "$VSIX_FILE") bytes)"
          npm run assert:vsix-assets -- "$VSIX_FILE"
          xvfb-run -a npm run smoke:vsix-install -- "$VSIX_FILE"

  post-pr-comment:
    name: PR Comment
    needs: test-installation
    if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # posts the VSIX artifact link on same-repo PRs
      actions: read # reads workflow artifacts to build the PR comment URL

    steps:
      - name: Get artifact URL
        id: get-artifact
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const vsix = artifacts.data.artifacts.find(a => a.name === 'vsix');
            const url = vsix
              ? `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${vsix.id}`
              : '';
            core.setOutput('vsix_url', url);

      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: extension-artifact
          message: |
            ## Extension Build Ready

            Download the VSIX from the workflow artifacts above.

            <details>
            <summary>Installation</summary>

            **VS Code UI:** Extensions > ... > Install from VSIX...

            **CLI:**
            ```
            code --install-extension b2-vscode-*.vsix
            ```
            </details>
